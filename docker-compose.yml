services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: pulseboard-app
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9080:8080"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-pulseboard}
      - DB_USERNAME=${DB_USERNAME:-pulseboard}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID:-pulseboard}
      - REVERB_APP_KEY=${REVERB_APP_KEY:?Set REVERB_APP_KEY in .env}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:?Set REVERB_APP_SECRET in .env}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    networks:
      - pulseboard

  mysql:
    image: docker.io/library/mysql:8.0
    container_name: pulseboard-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-pulseboard}
      - MYSQL_USER=${DB_USERNAME:-pulseboard}
      - MYSQL_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pulseboard

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: pulseboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pulseboard

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: pulseboard-test
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=testing
      - DB_CONNECTION=sqlite
      - "DB_DATABASE=:memory:"
      - CACHE_STORE=array
      - SESSION_DRIVER=array
      - QUEUE_CONNECTION=sync
    working_dir: /var/www/html
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'php artisan config:clear && php vendor/bin/phpunit "$@"',
        "--",
      ]
    profiles:
      - test
    networks:
      - pulseboard

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  pulseboard:
    driver: bridge

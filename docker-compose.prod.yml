# ---------------------------------------------------------------------------
# PulseBoard Production Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# This file is a self-contained production stack. All configuration is
# provided via environment variables (see .env.example for reference).
# ---------------------------------------------------------------------------

services:
  app:
    image: ${PULSEBOARD_IMAGE:-pulseboard:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: pulseboard-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${REVERB_EXTERNAL_PORT:-9080}:8080"
    env_file: .env
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - pulseboard

  mysql:
    image: docker.io/library/mysql:8.0
    container_name: pulseboard-mysql
    restart: unless-stopped
    # No host port binding in production — only accessible within Docker network
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-pulseboard}
      - MYSQL_USER=${DB_USERNAME:-pulseboard}
      - MYSQL_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pulseboard

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: pulseboard-redis
    restart: unless-stopped
    # No host port binding in production — only accessible within Docker network
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pulseboard

volumes:
  app-storage:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  pulseboard:
    driver: bridge
